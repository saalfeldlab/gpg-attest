name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  client-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.19'
          cache-dependency-path: client/go.sum
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Cross-compile all platforms
        run: cd client && make cross VERSION=${{ steps.version.outputs.version }}
      - name: Build deb (amd64)
        run: cd client && make deb VERSION=${{ steps.version.outputs.version }}
      - name: Build deb (arm64)
        run: cd client && ./scripts/build-deb.sh ./build/gpg-attest-linux-arm64 ${{ steps.version.outputs.version }} arm64
      - name: Upload client artifacts
        uses: actions/upload-artifact@v4
        with:
          name: client-artifacts
          path: |
            client/build/gpg-attest-*
            client/build/*.deb

  extension-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Write .env for AMO signing
        env:
          JWT_ISSUER: ${{ secrets.JWT_ISSUER }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          printf 'JWT_ISSUER=%s\nJWT_SECRET=%s\n' "$JWT_ISSUER" "$JWT_SECRET" > .env
      - name: Build and sign extension packages
        run: cd extension && bash build.sh
      - name: Upload extension artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extension-artifacts
          path: |
            extension/build/*.zip
            extension/build/*.xpi

  publish-release:
    runs-on: ubuntu-latest
    needs: [client-release, extension-release]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            artifacts/client-artifacts/* \
            artifacts/extension-artifacts/*
