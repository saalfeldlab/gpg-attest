name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  extension-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Write .env for AMO signing
        env:
          JWT_ISSUER: ${{ secrets.JWT_ISSUER }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          printf 'JWT_ISSUER=%s\nJWT_SECRET=%s\n' "$JWT_ISSUER" "$JWT_SECRET" > .env
      - name: Build and sign extension packages
        run: cd extension && bash build.sh
      - name: Upload extension artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extension-artifacts
          path: |
            extension/build/*.zip
            extension/build/*.xpi

  client-release-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.19'
          cache-dependency-path: client/go.sum
      - name: Install rpmbuild
        run: sudo apt-get update -qq && sudo apt-get install -y -qq rpm
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Cross-compile
        run: cd client && make cross VERSION=${{ steps.version.outputs.version }}
      - name: Build deb (amd64)
        run: cd client && make deb VERSION=${{ steps.version.outputs.version }}
      - name: Build deb (arm64)
        run: cd client && ./scripts/build-deb.sh ./build/gpg-attest-linux-arm64 ${{ steps.version.outputs.version }} arm64
      - name: Build rpm (x86_64)
        run: cd client && ./scripts/build-rpm.sh ./build/gpg-attest-linux-amd64 ${{ steps.version.outputs.version }} x86_64
      - name: Build rpm (aarch64)
        run: cd client && ./scripts/build-rpm.sh ./build/gpg-attest-linux-arm64 ${{ steps.version.outputs.version }} aarch64
      - name: Upload client artifacts
        uses: actions/upload-artifact@v4
        with:
          name: client-linux-artifacts
          path: |
            client/build/*.deb
            client/build/*.rpm
            client/build/gpg-attest-windows-*

  client-release-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.19'
          cache-dependency-path: client/go.sum
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Build macOS binary
        run: cd client && GOOS=darwin GOARCH=arm64 go build -ldflags "-X gpg-attest.org/client/internal/version.Version=${{ steps.version.outputs.version }}" -o build/gpg-attest gpg-attest.org/client/cmd/gpg-attest
      - name: Build pkg
        run: cd client && ./scripts/build-pkg.sh ./build/gpg-attest ${{ steps.version.outputs.version }}
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: client-macos-artifacts
          path: client/build/*.pkg

  publish-release:
    runs-on: ubuntu-latest
    needs: [extension-release, client-release-linux, client-release-macos]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            artifacts/client-linux-artifacts/* \
            artifacts/client-macos-artifacts/* \
            artifacts/extension-artifacts/*
