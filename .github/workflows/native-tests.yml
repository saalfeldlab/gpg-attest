name: Native tests
on:
  push:
    paths: ['native/**', '.github/workflows/native-tests.yml']
  pull_request:
    paths: ['native/**', '.github/workflows/native-tests.yml']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: native/go.mod
          cache-dependency-path: native/go.sum
      - name: Provision test GPG key
        run: bash .devcontainer/setup-test-keys.sh
      - name: Run tests
        run: cd native && go test ./...
